name: Voiceprint Tests

on:
  push:
    paths:
      - 'app/**'
      - 'scripts/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/voiceprint-tests.yml'
  pull_request:
    paths:
      - 'app/**'
      - 'scripts/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/voiceprint-tests.yml'

jobs:
  unit-tests:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    # Loop 3a Phase 1 introduces tests that use torch + torchaudio (forced-align
    # over synthetic logits). These pull a few hundred MB of wheels via pip, so
    # we cache the pip download index between runs to keep CI snappy.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install runtime + dev deps
        # Editable install so coverage paths match `app/...` source paths.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install coverage
      - name: Install espeak-ng
        # phonemizer requires the system espeak-ng library at import time;
        # without it tests that import app.services.phonemes can fail before
        # they even start collecting.
        run: |
          sudo apt-get update
          sudo apt-get install -y espeak-ng
      - name: Run pytest (deselect slow model tests)
        env:
          VOICEPRINT_DISABLE_PHONEMES: '1'
        run: pytest tests/ -m "not slow"
      - name: Alignment + smoothing coverage report
        # Spec §5.7 requires ≥80% line coverage on app/services/alignment.py.
        # Spec §10 requires ≥70% on every new module; we run both Phase 1 and
        # Phase 2 services through a single coverage pass and assert the
        # higher 80% bar — passing that automatically clears 70% on smoothing.
        env:
          VOICEPRINT_DISABLE_PHONEMES: '1'
        run: |
          coverage run --source=app.services.alignment,app.services.smoothing -m pytest tests/ -m "not slow"
          coverage report --fail-under=80
