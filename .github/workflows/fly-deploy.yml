# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group    # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # --local-only builds the image on the GitHub runner (which has Docker
      # pre-installed) and pushes it directly to Fly's registry. We use this
      # instead of --remote-only because Fly's remote Depot builder has been
      # unable to reach files.pythonhosted.org (Fastly CDN) — every TCP
      # connection RST'd within ms — making it impossible to pip-install
      # torch's deps. GH runners reach Fastly fine, so the build works there.
      - run: flyctl deploy --local-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
